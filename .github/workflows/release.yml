name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.4.0)'
        required: true
        default: 'v1.4.0'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: 'Automated release via GitHub Actions'
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build Application
      run: |
        xcodebuild clean build -scheme Bluesnooze -configuration Release SYMROOT="$(PWD)/build"
        
    - name: Compress App
      run: |
        cd build/Release
        zip -r Bluesnooze.zip Bluesnooze.app

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      with:
        files: build/Release/Bluesnooze.zip
        tag_name: ${{ github.event.inputs.version || 'latest' }}
        name: 'Latest Version'
        body: ${{ github.event.inputs.release_notes || 'Bluesnooze with connect on wake and performance optimizations.' }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
